services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MICROFLOW_DATA_DIR: /opt/microflow/data
      MICROFLOW_DB_PATH: /opt/microflow/db/microflow.db
      MICROFLOW_AGENT_CONFIG_PATH: /opt/microflow/data/agents.json
      MICROFLOW_SERVER_ORIGIN: ${MICROFLOW_SERVER_ORIGIN:-http://localhost:8080}
      MICROFLOW_API_BASE_URL: ${MICROFLOW_API_BASE_URL:-http://localhost:8080/api/v1}
      MICROFLOW_WS_BASE_URL: ${MICROFLOW_WS_BASE_URL:-ws://localhost:8080/ws}
      MICROFLOW_HTTP_ALLOWED_ORIGIN_PATTERNS: ${MICROFLOW_HTTP_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://127.0.0.1:3000}
      MICROFLOW_WS_ALLOWED_ORIGIN_PATTERNS: ${MICROFLOW_WS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://127.0.0.1:3000}
      MICROFLOW_JWT_SECRET: ${MICROFLOW_JWT_SECRET:?Set MICROFLOW_JWT_SECRET in .env}
      MICROFLOW_CRYPTO_SECRET: ${MICROFLOW_CRYPTO_SECRET:?Set MICROFLOW_CRYPTO_SECRET in .env}
      MICROFLOW_SEED_DEMO_ENABLED: ${MICROFLOW_SEED_DEMO_ENABLED:-false}
      OPENCLAW_ENDPOINT_URL: ${OPENCLAW_ENDPOINT_URL:-}
      OPENCLAW_CREDENTIAL: ${OPENCLAW_CREDENTIAL:-}
      OPENCLAW_AGENT_KEYS: ${OPENCLAW_AGENT_KEYS:-assistant,reviewer}
    ports:
      - "${MICROFLOW_BACKEND_PORT:-8080}:8080"
    volumes:
      - ./ops/docker/backend/data:/opt/microflow/data
      - ./ops/docker/backend/db:/opt/microflow/db
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/api/v1/system/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${MICROFLOW_FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
